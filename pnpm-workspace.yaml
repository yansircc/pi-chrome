catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vitest: 4.1.10
  vite-plus: 0.2.4
overrides:
  vite: "catalog:"
  vitest: "catalog:"

# Vite+ core contains Vite 8.1.3 but publishes under the Vite+ 0.2.4 semver.
# Remove this exception when the core package exposes a Vite-compatible version.
peerDependencyRules:
  allowedVersions:
    vite: 0.2.4

allowBuilds:
  "@google/genai": false
  esbuild: false
  msgpackr-extract: false
  protobufjs: false

minimumReleaseAgeExclude:
  - "@yansircc/effect-scan"
